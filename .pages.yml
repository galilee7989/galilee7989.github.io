media:
  - name: uploads
    label: 一般上傳
    input: public/uploads
    output: /uploads
  - name: prayletter-pdfs
    label: 禱告信 PDF
    input: public/prayletters
    output: /prayletters
    extensions: [pdf]
  - name: gallery-images
    label: 照片
    input: public/uploads
    output: /uploads
    categories: [image]

content:
  - name: prayletters
    label: 禱告信
    type: collection
    path: src/data/prayletters
    format: json
    filename:
      template: "{fields.slug}.json"
      field: false
    view:
      fields: [title, slug, date, pdf]
      primary: title
      sort: [slug, date, title]
      search: [title, slug, pdf]
      default:
        sort: slug
        order: desc
    fields:
      - name: title
        label: 標題
        type: string
        required: true
        description: 例：2026年07月禱告信
        options:
          maxlength: 40
      - name: slug
        label: 月份代碼
        type: string
        required: true
        description: 排序與網址用。格式固定為西元年-月份，例如 2026-07。
        pattern:
          regex: "^[0-9]{4}-(0[1-9]|1[0-2])$"
          message: 請使用 YYYY-MM 格式，例如 2026-07
      - name: date
        label: 發布日期
        type: date
        required: true
        description: 通常選該月份 1 日即可；清單以月份代碼排序。
        options:
          format: yyyy-MM-dd
      - name: pdf
        label: PDF 檔案
        type: file
        required: true
        description: 上傳或選擇本月份禱告信 PDF。
        options:
          media: prayletter-pdfs
          extensions: [pdf]
      - name: originalUrl
        label: 舊站原始網址
        type: string
        hidden: true
  - name: gallery
    label: 照片
    type: file
    path: src/data/gallery.json
    format: json
    list: true
    fields:
      - name: src
        label: 圖片
        type: image
        options:
          media: gallery-images
      - name: alt
        label: 說明文字
        type: string
